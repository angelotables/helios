<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>HELIOS — Health OS</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'><stop offset='0' stop-color='%23FFC763'/><stop offset='1' stop-color='%23EF6B52'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='%23FBF3E7'/><circle cx='50' cy='50' r='23' fill='url(%23g)'/><path d='M15 50 L38 50 L42.5 55 L50 35 L57.5 60 L62.5 50 L85 50' fill='none' stroke='%2316120E' stroke-width='5.5' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
<link rel="manifest" href="manifest.json" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#141019" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
  :root{
    --void:#141019; --panel:#1D1721; --panel2:#251B27; --edge:#332734; --edge2:#4A3947;
    --cy:#FF7A50; --cy2:#F0603A; --amber:#FFC65C; --red:#FF5D6C; --green:#3ECF8E;
    --txt:#F5EEE7; --dim:#A08E97; --dim2:#5E4C58;
    --sun:linear-gradient(135deg,#FFC65C 0%,#FF6B57 100%);
    --disp:'Inter',sans-serif; --mono:'Sora',sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  :focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:6px}
  @media (prefers-reduced-motion:reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
  }
  body{margin:0;background:var(--void);color:var(--txt);font-family:var(--disp);font-size:15.5px;min-height:100vh;
    font-variant-numeric:tabular-nums;
    background-image:
      radial-gradient(900px 480px at 75% -12%,rgba(255,107,87,.14),transparent 62%),
      radial-gradient(700px 420px at -12% 108%,rgba(255,198,92,.08),transparent 60%);
    background-attachment:fixed}
  .wrap{max-width:660px;margin:0 auto;padding:14px 14px calc(90px + env(safe-area-inset-bottom))}
  .mono{font-family:var(--mono)}

  /* header */
  .hdr{padding:calc(16px + env(safe-area-inset-top)) 16px 12px;max-width:660px;margin:0 auto}
  .hrow{display:flex;justify-content:space-between;align-items:center}
  .logo{display:flex;align-items:center;gap:10px}
  .core{width:34px;height:34px;border-radius:50%;background:var(--sun);position:relative;
    box-shadow:0 0 22px rgba(255,122,80,.5);animation:corepulse 4s ease-in-out infinite}
  @keyframes corepulse{0%,100%{box-shadow:0 0 14px rgba(255,122,80,.45),inset 0 0 10px rgba(255,122,80,.3)}50%{box-shadow:0 0 26px rgba(255,122,80,.8),inset 0 0 16px rgba(255,122,80,.5)}}
  h1{margin:0;font-family:var(--mono);font-size:21px;font-weight:700;letter-spacing:.16em;color:#F7EFE8}
  .sub{font-family:var(--mono);font-size:9.5px;letter-spacing:.3em;color:var(--dim)}
  .lockb{background:rgba(255,122,80,.07);border:1px solid var(--edge2);color:var(--cy);border-radius:10px;padding:8px 13px;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;cursor:pointer;transition:all .2s}
  .lockb:active{transform:scale(.94)}
  .datebar{display:flex;justify-content:space-between;align-items:center;margin-top:12px;font-family:var(--mono);font-size:11px;color:var(--dim)}
  .tminus{color:var(--amber);text-shadow:0 0 12px rgba(255,180,84,.35)}

  /* tabs — fixed bottom navigation */
  .tabs{position:fixed;left:0;right:0;bottom:0;z-index:60;display:flex;justify-content:space-around;gap:0;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));
    background:rgba(20,16,25,.88);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
    border-top:1px solid var(--edge)}
  .tabs button{background:transparent;color:var(--dim);border:none;border-radius:14px;padding:6px 10px;min-width:52px;
    font-size:9px;font-weight:700;letter-spacing:.1em;cursor:pointer;white-space:nowrap;font-family:var(--mono);transition:all .18s;
    display:flex;flex-direction:column;align-items:center;gap:3px}
  .tabs button .ti{width:22px;height:22px;display:block;margin:0 auto;color:currentColor;opacity:.55;transition:opacity .18s,transform .18s}
  .tabs button.on{color:var(--cy)}
  .tabs button.on .ti{opacity:1;transform:translateY(-1px)}
  .tabs button.on::after{content:'';width:14px;height:3px;border-radius:2px;background:var(--sun);margin-top:1px}

  /* panels */
  .panel{background:linear-gradient(165deg,var(--panel) 0%,var(--panel2) 100%);border:1px solid var(--edge);border-radius:20px;
    padding:16px 17px;margin-bottom:14px;position:relative;animation:boot .28s ease both}
  @keyframes boot{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  .panel::before{content:'';position:absolute;top:-1px;left:18px;right:18px;height:1px;
    background:linear-gradient(90deg,transparent,rgba(255,198,92,.45),rgba(255,107,87,.45),transparent)}
  .ptitle{font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:var(--dim);margin-bottom:11px;display:flex;justify-content:space-between;align-items:baseline}
  .ptitle b{color:var(--cy);font-weight:600}

  /* rings */
  .rings{display:flex;justify-content:space-around;gap:8px}
  .ringbox{text-align:center}
  .ringbox svg{transform:rotate(-90deg)}
  .ringv{font-family:var(--mono);font-size:19px;font-weight:800;fill:#F7EFE8}
  .ringl{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;fill:var(--dim)}
  .ringt{font-family:var(--mono);font-size:9px;fill:var(--dim2)}
  .minibars{display:flex;gap:10px;margin-top:13px}
  .mb{flex:1}
  .mb .l{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:var(--dim);margin-bottom:4px}
  .mb .track{height:5px;background:#0A1524;border-radius:3px;overflow:hidden;border:1px solid var(--edge)}
  .mb .fill{height:100%;border-radius:3px;transition:width .5s ease}

  .statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
  .showcase{position:relative;border-radius:20px;padding:18px 16px;margin-bottom:14px;overflow:hidden;text-align:center;
    background:linear-gradient(165deg,var(--panel),var(--panel2));border:1.5px solid transparent;
    background-clip:padding-box}
  .showcase::before{content:'';position:absolute;inset:-2px;z-index:-1;border-radius:22px;
    background:linear-gradient(120deg,#FF8FBF,#FFC65C,#FF6B57,#FF8FBF);background-size:300% 300%;
    animation:marquee 5s linear infinite}
  @keyframes marquee{0%{background-position:0% 50%}100%{background-position:300% 50%}}
  .showcase .swho{font-family:var(--mono);font-size:10px;letter-spacing:.3em;color:var(--dim);margin-bottom:2px}
  .showcase .stitle{font-family:var(--mono);font-size:15px;font-weight:800;letter-spacing:.1em;
    background:linear-gradient(90deg,#FF8FBF,#FF6B57,#FFC65C);-webkit-background-clip:text;background-clip:text;color:transparent}
  .cdrow{display:flex;justify-content:center;gap:8px;margin:13px 0 6px}
  .cd{min-width:60px;background:rgba(255,143,191,.07);border:1px solid var(--edge);border-radius:13px;padding:9px 6px}
  .cd b{display:block;font-family:var(--mono);font-size:26px;font-weight:800}
  .cd span{font-size:9.5px;letter-spacing:.18em;color:var(--dim)}
  .sline{font-size:12.5px;color:var(--dim);margin-top:7px;line-height:1.5}
  .stat{background:rgba(255,122,80,.04);border:1px solid var(--edge);border-radius:11px;padding:11px 13px}
  .stat .k{font-family:var(--mono);font-size:9px;letter-spacing:.2em;color:var(--dim)}
  .stat .v{font-family:var(--mono);font-size:19px;font-weight:800;color:#F7EFE8;margin-top:3px}
  .stat .v small{font-size:11px;color:var(--dim);font-weight:400}
  .stat.warn .v{color:var(--amber)} .stat.good .v{color:var(--green)} .stat.bad .v{color:var(--red)}

  /* buttons & inputs */
  .btn{border:1px solid var(--cy2);border-radius:11px;padding:12px 16px;font-size:14px;font-weight:700;letter-spacing:.1em;cursor:pointer;
    color:var(--cy);background:rgba(255,122,80,.08);font-family:var(--mono);transition:all .15s;
    box-shadow:0 0 14px -6px rgba(255,122,80,.6)}
  .btn:active{transform:scale(.96);background:rgba(255,122,80,.16)}
  .btn.solid{background:var(--sun);color:#2A130C;border-color:transparent;box-shadow:0 8px 22px -8px rgba(255,107,87,.65)}
  .btn.amber{border-color:#B07E33;color:var(--amber);background:rgba(255,180,84,.07);box-shadow:0 0 14px -6px rgba(255,180,84,.5)}
  .btn.red{border-color:#8f3b3b;color:var(--red);background:rgba(255,93,93,.06);box-shadow:none}
  .btn.wide{width:100%}
  .btn[disabled]{opacity:.45}
  .ghost{background:none;border:none;color:var(--dim);font-size:13px;cursor:pointer;font-family:var(--mono)}
  input,select{width:100%;border:1px solid var(--edge2);border-radius:10px;padding:11px 12px;font-size:16px;font-family:var(--mono);
    color:var(--txt);background:#081020;outline:none;transition:all .2s}
  input:focus{border-color:var(--cy);box-shadow:0 0 0 3px rgba(255,122,80,.12)}
  .row{display:flex;gap:8px}.row>*{flex:1}
  .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;color:var(--dim);margin:2px 0 6px}

  /* food picks */
  .fpick{display:flex;width:100%;align-items:center;gap:12px;background:rgba(13,23,40,.75);border:1px solid var(--edge);border-radius:13px;
    padding:11px 13px;margin-bottom:8px;cursor:pointer;text-align:left;font-family:var(--disp);color:var(--txt);transition:all .15s}
  .fpick:active{transform:scale(.975);border-color:var(--cy2)}
  .fpick .ico{width:42px;height:42px;min-width:42px;border-radius:11px;background:rgba(255,122,80,.06);border:1px solid var(--edge);
    display:flex;align-items:center;justify-content:center;font-size:22px}
  .fpick .nm{flex:1;font-size:15px;font-weight:600}
  .fpick .mac{font-family:var(--mono);font-size:10.5px;color:var(--dim)}
  .fpick .kc{font-family:var(--mono);font-size:14px;font-weight:800;color:var(--cy)}
  .meal{display:flex;justify-content:space-between;gap:8px;padding:9px 0;border-bottom:1px solid var(--edge);font-size:14.5px;align-items:baseline}
  .meal .t{font-family:var(--mono);font-size:10.5px;color:var(--dim)}
  .meal .m{font-family:var(--mono);font-size:10.5px;color:var(--dim)}
  .meal .x{background:none;border:none;color:var(--dim2);cursor:pointer;font-size:13px;padding:0 4px}

  /* supplements & injection */
  .supp{display:flex;width:100%;align-items:center;gap:12px;background:rgba(13,23,40,.75);border:1px solid var(--edge);border-radius:12px;
    padding:12px 14px;margin-bottom:8px;cursor:pointer;text-align:left;color:var(--txt);font-family:var(--disp);font-size:15px;font-weight:600;transition:all .18s}
  .supp .box{width:26px;height:26px;min-width:26px;border-radius:8px;border:2px solid var(--edge2);display:flex;align-items:center;justify-content:center;
    color:#2A130C;font-weight:800;transition:all .18s}
  .supp.on{border-color:rgba(74,227,160,.4)}
  .supp.on .box{background:var(--green);border-color:var(--green);box-shadow:0 0 12px rgba(74,227,160,.5)}
  .supp .del{background:none;border:none;color:var(--dim2);cursor:pointer;font-size:14px}
  .sitegrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin:10px 0}
  .site{border:1px solid var(--edge2);border-radius:12px;padding:14px 0;background:rgba(13,23,40,.7);color:var(--dim);
    font-family:var(--mono);font-size:12px;letter-spacing:.1em;cursor:pointer;text-align:center;transition:all .18s}
  .site.on{color:var(--cy);border-color:var(--cy);background:rgba(255,122,80,.1);box-shadow:0 0 16px -4px rgba(255,122,80,.6)}
  .site.sugg{border-style:dashed;border-color:var(--amber);color:var(--amber)}
  .weekstrip{display:flex;gap:6px;margin-top:10px}
  .wd{flex:1;text-align:center;padding:9px 0;border-radius:9px;border:1px solid var(--edge);font-family:var(--mono);font-size:10px;color:var(--dim)}
  .wd.hit{color:var(--green);border-color:rgba(74,227,160,.5);background:rgba(74,227,160,.07);box-shadow:0 0 10px -4px rgba(74,227,160,.6)}
  .wd.today{border-color:var(--cy)}

  /* charts */
  .spark{width:100%;height:120px}
  .axis{font-family:var(--mono);font-size:9px;fill:var(--dim2)}

  .toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    background:linear-gradient(135deg,#1690B0,var(--cy2));color:#2A130C;border-radius:999px;padding:11px 24px;font-size:13px;
    font-family:var(--mono);font-weight:800;box-shadow:0 0 30px rgba(255,122,80,.5);z-index:60;animation:tpop .3s cubic-bezier(.5,1.6,.5,1)}
  @keyframes tpop{from{opacity:0;transform:translate(-50%,14px) scale(.9)}to{opacity:1;transform:translate(-50%,0)}}
  .banner{border-radius:11px;padding:11px 14px;font-size:13.5px;margin-bottom:13px;line-height:1.5;font-family:var(--mono)}
  .banner.err{background:rgba(255,93,93,.08);color:var(--red);border:1px solid rgba(255,93,93,.3)}
  .dim{color:var(--dim);font-size:13px;line-height:1.55}
  .empty{text-align:center;color:var(--dim2);font-family:var(--mono);font-size:12px;padding:16px 0;letter-spacing:.1em}

  /* lock screen */
  .login{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 18px;position:relative;overflow:hidden}
  .login::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;
    background:radial-gradient(circle,rgba(255,122,80,.12),transparent 60%);animation:corepulse 4s ease-in-out infinite}
  .lcore{width:88px;height:88px;border-radius:50%;border:3px solid var(--cy);position:relative;margin-bottom:18px;
    box-shadow:0 0 40px rgba(255,122,80,.6),inset 0 0 24px rgba(255,122,80,.3);animation:corepulse 3s ease-in-out infinite}
  .lcore::after{content:'';position:absolute;inset:26px;border-radius:50%;background:var(--cy);box-shadow:0 0 24px var(--cy)}
  .lcard{position:relative;z-index:1;width:100%;max-width:380px;text-align:center}
  .dots{display:flex;gap:15px;justify-content:center;margin:18px 0 22px}
  .dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--edge2);transition:all .15s cubic-bezier(.5,1.6,.5,1)}
  .dot.f{background:var(--cy);border-color:var(--cy);transform:scale(1.2);box-shadow:0 0 12px rgba(255,122,80,.7)}
  .dots.bad .dot{border-color:var(--red);animation:shake .32s}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}
  .pad{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;max-width:270px;margin:0 auto}
  .key{border:1px solid var(--edge2);border-radius:15px;background:rgba(13,23,40,.8);color:var(--txt);font-size:21px;font-weight:600;
    padding:15px 0;cursor:pointer;font-family:var(--mono);transition:all .12s}
  .key:active{transform:scale(.9);background:rgba(255,122,80,.12);border-color:var(--cy)}
  .key.ghostk{background:transparent;border-color:transparent;font-size:17px;color:var(--dim)}

  /* ---- NEREID: sunlit lagoon (light) ---- */
  body.sea{--void:#FFF8F0; --panel:#FFFFFF; --panel2:#FFFDF9; --edge:#F0E0D2; --edge2:#E2C9B6;
    --cy:#0FA88F; --cy2:#0B8871; --txt:#33272A; --dim:#A08E88; --dim2:#D9C8BD;
    background-image:
      radial-gradient(800px 420px at 80% -10%,rgba(255,143,191,.12),transparent 60%),
      radial-gradient(650px 400px at -10% 108%,rgba(255,198,92,.14),transparent 60%)}
  body.sea h1{color:#3A2A2E;text-shadow:none}
  body.sea .sub,body.sea .tag{color:#B99C93}
  body.sea .panel{box-shadow:0 10px 30px -16px rgba(120,70,50,.25);border-color:var(--edge)}
  body.sea .panel::before{background:linear-gradient(90deg,transparent,rgba(255,143,191,.55),rgba(255,198,92,.55),transparent)}
  body.sea .lockb{background:rgba(15,168,143,.08);border-color:var(--edge2);color:var(--cy)}
  body.sea .tabs{background:rgba(255,251,246,.9);border-top-color:var(--edge)}
  body.sea .tabs button{color:#C4AFA6}
  body.sea .tabs button.on{color:var(--cy)}
  body.sea input,body.sea select{background:#FFFBF6;border-color:var(--edge2);color:var(--txt)}
  body.sea .ai{background:rgba(255,143,191,.05);border-color:#F2CBDD}
  body.sea .ai textarea{background:#FFFBF6;border-color:var(--edge2);color:var(--txt)}
  body.sea .fpick,body.sea .supp,body.sea .site{background:#FFFFFF;box-shadow:0 3px 12px -6px rgba(15,168,143,.2)}
  body.sea .fpick .ico{background:linear-gradient(145deg,#E9F8F3,#FDF0F6);border-color:var(--edge)}
  body.sea .stat{background:#FFFFFF;box-shadow:0 3px 12px -6px rgba(15,168,143,.2)}
  body.sea .stat.good .v{color:var(--green)} body.sea .stat.warn .v{color:var(--amber)} body.sea .stat.bad .v{color:var(--red)}
  body.sea .stat .v{color:#12403A}
  body.sea .ringv{fill:#12403A} body.sea .ringl,body.sea .ringt{fill:#7FB0A7}
  body.sea .btn{background:rgba(15,168,143,.08)}
  body.sea .btn.solid{background:linear-gradient(135deg,#0FA88F,#3BC9AE);color:#fff}
  body.sea .key{background:#FFFFFF;border-color:var(--edge);color:var(--txt);box-shadow:0 3px 10px -4px rgba(15,168,143,.25)}
  body.sea .key:active{background:#E9F7F2}
  body.sea .login{background:linear-gradient(165deg,#CFF2E7 0%,#EAF7F3 50%,#FDE8F1 100%)}
  body.sea .login::before{background:radial-gradient(circle,rgba(255,143,191,.28),transparent 60%)}
  body.sea .login::after{content:'';position:absolute;width:440px;height:440px;border-radius:50%;bottom:-180px;left:-130px;
    background:radial-gradient(circle,rgba(255,205,120,.3),transparent 62%)}
  body.sea .login h1{color:#0C4B41}
  body.sea .backl{color:#5D8B84}
  body.sea .core,body.sea .lcore{border-color:#0FA88F;box-shadow:0 0 22px rgba(15,168,143,.45),inset 0 0 12px rgba(15,168,143,.25)}
  body.sea .core::after,body.sea .lcore::after{background:linear-gradient(135deg,#0FA88F,#FF8FBF);box-shadow:0 0 14px rgba(255,143,191,.6)}
  body.sea .tminus{color:#E85C9B;text-shadow:0 0 12px rgba(255,143,191,.35)}
  body.sea .toast{background:linear-gradient(135deg,#0FA88F,#FF8FBF);color:#fff;box-shadow:0 10px 30px -6px rgba(232,92,155,.45)}
  body.sea .banner.err{background:#FDECF1;border-color:#F6C4D3}
  body.sea .meal{border-color:#EAF3EF}
  body.sea .aires{border-color:var(--edge2);background:#FBFEFD}
  body.sea .wd.hit{color:var(--green);border-color:rgba(18,179,128,.5);background:rgba(18,179,128,.08)}
  .wminus{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:8px;
    border:1px solid var(--edge2);color:var(--dim);font-size:17px;font-weight:700;margin-left:10px;vertical-align:middle;cursor:pointer}
  /* profile select */
  .profiles{display:flex;flex-direction:column;gap:14px;width:100%;max-width:380px;position:relative;z-index:1}
  .prof{display:flex;align-items:center;gap:16px;background:rgba(13,23,40,.85);border:1px solid var(--edge2);border-radius:18px;
    padding:18px;cursor:pointer;text-align:left;color:var(--txt);font-family:var(--disp);transition:all .2s;backdrop-filter:blur(8px)}
  .prof:active{transform:scale(.97)}
  .prof .pico{width:56px;height:56px;min-width:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;border:2px solid}
  .prof .pn{font-size:19px;font-weight:700;letter-spacing:.14em}
  .prof .ps{font-family:var(--mono);font-size:9.5px;letter-spacing:.2em;color:var(--dim);margin-top:3px}
  .prof.sun{border-color:rgba(255,122,80,.4)} .prof.sun .pico{border-color:#FF7A50;box-shadow:0 0 18px rgba(255,122,80,.5);background:rgba(255,122,80,.08)}
  .prof.mer{border-color:rgba(95,232,201,.4)} .prof.mer .pico{border-color:#5FE8C9;box-shadow:0 0 18px rgba(95,232,201,.5);background:rgba(95,232,201,.08)}
  /* AI */

};
const dkey=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const todayKey=()=>dkey(new Date());

const emptyDay=()=>({meals:[],supps:{},inj:null,water:0});

const NavIcon=({id})=>{

  </svg>`;
};
function App(){
  const [profile,setProfile]=useState(null);
  const [aiMeta,setAiMeta]=useState(null);
  const [authed,setAuthed]=useState(false);
  const [pinBuf,setPinBuf]=useState('');
  const [pinMode,setPinMode]=useState('enter');
  const [firstPin,setFirstPin]=useState('');
  const [pinBad,setPinBad]=useState(false);
  const [busy,setBusy]=useState(false);
  const [meta,setMeta]=useState(null);      // {pin,targets,foods,supps,weightLog,injLog}
  const [day,setDay]=useState(null);        // today's doc
  const [dayLoaded,setDayLoaded]=useState(false);
  const [tab,setTab]=useState('cmd');
  useEffect(()=>{window.scrollTo({top:0,left:0,behavior:'instant'});},[tab]);
  const [err,setErr]=useState('');
  const [toast,setToast]=useState('');
  const toastT=useRef(null);
  const [foodForm,setFoodForm]=useState(null);
  const [suppAdd,setSuppAdd]=useState('');
  const [suppEdit,setSuppEdit]=useState(false);
  const [foodQ,setFoodQ]=useState('');
  const [foodEdit,setFoodEdit]=useState(false);
  const [qfOpen,setQfOpen]=useState(()=>localStorage.getItem('qf-open')==='1');
  const toggleQf=()=>{const v=!qfOpen;setQfOpen(v);localStorage.setItem('qf-open',v?'1':'0');};
  const [wIn,setWIn]=useState('');
  const [trainSub,setTrainSub]=useState('log');
  const [wk,setWk]=useState({type:'class',min:'60'});
  const [pl,setPl]=useState({type:'class'});
  const [fbReady,setFbReady]=useState(false);
  useEffect(()=>{
    let done=false;
    const un=onAuthStateChanged(auth,(u)=>{if(u&&!done){done=true;setFbReady(true);}},()=>{});
    const t=setTimeout(()=>{if(!done){done=true;setFbReady(true);}},2500); // fail-open if auth is unreachable
    return ()=>{un();clearTimeout(t);};
  },[]);
  const [dayKey,setDayKey]=useState(todayKey());
  useEffect(()=>{
    const t=setInterval(()=>{const k=todayKey();setDayKey(p=>p===k?p:k);},15000);
    return ()=>clearInterval(t);
  },[]);
  const [editT,setEditT]=useState(null);
  useEffect(()=>{
    if(!err)return;
    const t=setTimeout(()=>setErr(''),7000);
    return ()=>clearTimeout(t);
  },[err]);

  const srvSeen=useRef({});
  const trustSnap=(key,s)=>{
    const fromCache=!!(s.metadata&&s.metadata.fromCache);
    if(fromCache&&srvSeen.current[key])return false;
    if(fromCache&&!s.exists())return false;
    if(!fromCache)srvSeen.current[key]=true;
    return true;
  };
  const [stuck,setStuck]=useState(false);
  useEffect(()=>{
    if(!authed)return;
    const t=setTimeout(()=>{if(!dayLoaded)setStuck(true);},9000);
    if(dayLoaded)setStuck(false);
    return ()=>clearTimeout(t);
  },[authed,dayLoaded]);
  const [injSiteSel,setInjSiteSel]=useState({});
  const SITES=meta?.injSites?.length?meta.injSites.map(s2=>Array.isArray(s2)?s2:(s2&&typeof s2==='object'&&s2.id?[s2.id,s2.label||s2.id]:[s2,s2])):DEF_SITES;
  const packSites=(list)=>list.map(([id2,label2])=>({id:id2,label:label2})); // Firestore forbids nested arrays
  const [siteEdit,setSiteEdit]=useState(false);
  const [siteAdd,setSiteAdd]=useState('');
  const [siteArm,setSiteArm]=useState(null);
  const [injFasted,setInjFasted]=useState(true);
  const [now,setNow]=useState(new Date());

  const flash=(m)=>{setToast(m);clearTimeout(toastT.current);toastT.current=setTimeout(()=>setToast(''),1500);};
  useEffect(()=>{const t=setInterval(()=>setNow(new Date()),30000);return ()=>clearInterval(t);},[]);

  useEffect(()=>{
    if(!authed)return; // shared AI config is now readable only once signed in
    const ua=onSnapshot(D('helios_ai'),(s)=>{if(!trustSnap('ai',s))return;setAiMeta(s.exists()?s.data():{});},()=>{});
    return ()=>ua();
  },[authed]);
  useEffect(()=>{
    if(!profile)return;
    if(document.body)document.body.className=profile==='nereid'?'sea':'';
    // Data lives behind the login now — only subscribe once this profile's PIN has signed us in.
    if(!authed){setMeta(null);setDay(null);setDayLoaded(false);return;}
    const P2=PROFILES[profile];
    const um=onSnapshot(D(P2.metaDoc),(s)=>{if(!trustSnap('meta_'+P2.metaDoc,s))return;setMeta(s.exists()?s.data():{});},()=>setErr('No connection.'));
    const ud=onSnapshot(D(P2.dayPrefix+dayKey),(s)=>{if(!trustSnap('day_'+P2.dayPrefix+dayKey,s))return;setDay(s.exists()?s.data():emptyDay());setDayLoaded(true);},()=>setErr('No connection.'));
    return ()=>{um();ud();};
  },[profile,dayKey,authed]);
  // Daily auto-backup — a backup only ever accepts an equal-or-bigger copy.
  useEffect(()=>{
    if(!authed||meta===null)return;
    const today=todayKey();
    const lk='hel-bak-'+profile;
    if(localStorage.getItem(lk)===today)return;
    localStorage.setItem(lk,today);
    (async()=>{
      try{
        const n=(meta.injLog||[]).length+(meta.workLog||[]).length+(meta.weightLog||[]).length+(meta.foods||[]).length+Object.keys(meta.vhist||{}).length+Object.keys(meta).length;
        const bk=D('bak_'+P.metaDoc);
        let prev=-1;
        try{const g=await getDoc(bk);if(g.exists())prev=g.data().n??-1;}catch(e){}

  },[authed,meta===null,profile]);

  const P=profile?PROFILES[profile]:PROFILES.helios;
  const saveMeta=(patch)=>{
    if(meta===null){setErr('Still connecting — retry in a second.');return;}
    setDoc(D(P.metaDoc),{...meta,...patch}).catch(e=>setErr('Save failed. '+(e.message||e)));
  };
  const saveDay=(next)=>{
    if(!dayLoaded){setErr('Still connecting — retry in a second.');return;}
    setDay(next);
    setDoc(D(P.dayPrefix+dayKey),next).catch(e=>setErr('Save failed. '+(e.message||e)));
  };
  const saveAiKey=(k)=>{
    if(aiMeta===null){setErr('Still connecting — retry in a second.');return;}
    setDoc(D('helios_ai'),{...aiMeta,key:k.trim()}).catch(e=>setErr('Save failed. '+(e.message||e)));

  // ---- lock ----

    if(authed)return;
    const h=(e)=>{

    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[authed,pinBuf,pinMode,pinBad,firstPin,meta,profile]);
  function pressKey(k){
    if(busy)return;
    if(pinBad)setPinBad(false);

    if(pinBuf.length>=4)return;
    const nb=pinBuf+k;setPinBuf(nb);
    if(nb.length===4)setTimeout(()=>submitPin(nb),120);
  }
  // The PIN *is* the account password now. First PIN ever typed for a profile creates
  // its account; after that, the right PIN signs in and a wrong one is rejected by Firebase.
  async function submitPin(code){
    setBusy(true);
    const email=P.email, pw=PIN_PAD+code;
    try{
      await signInWithEmailAndPassword(auth,email,pw);
      setAuthed(true);setPinBuf('');
    }catch(e){
      try{
        await createUserWithEmailAndPassword(auth,email,pw); // no account yet → this PIN sets it
        setAuthed(true);setPinBuf('');
      }catch(e2){
        // account exists (email-already-in-use) → the PIN was simply wrong; anything else = network
        if(e2&&e2.code&&e2.code!=='auth/email-already-in-use'&&e2.code!=='auth/network-request-failed')setErr('Sign-in failed. '+(e2.message||e2));
        setPinBad(true);setPinBuf('');
      }
    }finally{setBusy(false);}
  }

  // ---- derived ----
  const T={...P.targets,...(meta?.targets||{})};
  const waterGoal=meta?.waterGoal||8;
  const unit=meta?.unit||'lb';
  const toDisp=(lb)=>unit==='kg'?Math.round(lb*0.4536*10)/10:lb;
  const toLb=(v)=>unit==='kg'?Math.round(v/0.4536*10)/10:v;
  const uLabel=unit.toUpperCase();
  const foods=meta?.foods||P.foods;
  const suppList=meta?.supps||P.supps;
  const weightLog=meta?.weightLog||[];
  const injLog=meta?.injLog||[];
  const d=day||emptyDay();
  const tot=useMemo(()=>{
    const s={kcal:0,p:0,c:0,f:0,pre:0};
    for(const m of d.meals){s.kcal+=m.kcal;s.p+=m.p;s.c+=m.c;s.f+=m.f;if(m.hour<12)s.pre+=m.kcal;}

                <div style="display:flex;justify-content:space-between;align-items:center;font-size:13px;padding:3px 0" key=${w.id}>
                  <span>${typeLabel(w.type)} ${w.name||w.type.toUpperCase()}${w.min?html`<span class="dim" style="font-size:11px"> · ${w.min} min</span>`:''}</span>
                  <button class="ghost" style="color:var(--red);padding:0 4px" onClick=${()=>{if(confirm('Remove this session?'))delWorkout(w.id);}}>✕</button>
</div>`)}
              ${entries.length===0&&html`<div class="dim" style="font-size:12px">Nothing logged — rest day, or add what you did below.</div>`}
              ${tAdd===null?html`
                <button class="btn wide mt8" onClick=${()=>setTAdd({type:'gym'})}>＋ LOG A SESSION TO THIS DAY</button>
              `:html`
                <div style="border-top:1px dashed var(--edge2);margin-top:8px;padding-top:8px">
                  <div class="row">
                    ${WTYPES.map(([tv,tl])=>html`
                      <button class=${'site'+(tAdd.type===tv?' on':'')} key=${tv} onClick=${()=>setTAdd({...tAdd,type:tv})}>${tl}</button>`)}
</div>
                  ${tAdd.type==='class'&&html`<input class="mt8" placeholder="Which class?" value=${tAdd.name||''} onInput=${e=>setTAdd({...tAdd,name:e.target.value})} />`}
                  <div class="row mt8">
                    <input inputmode="numeric" placeholder="minutes (optional)" value=${tAdd.min||''} onInput=${e=>setTAdd({...tAdd,min:e.target.value})} />
</div>
                  <div class="row mt8">
                    <button class="btn solid" onClick=${()=>{
                      if(tAdd.type==='class'&&!(tAdd.name||'').trim()){setErr('Which class?');return;}
                      saveMeta({workLog:[{id:Date.now().toString(36),date:k,t:'backfill',type:tAdd.type,name:(tAdd.name||'').trim()||null,min:tAdd.min?parseInt(tAdd.min):null},...workLog].slice(0,600)});
                      setTAdd(null);flash('SESSION LOGGED TO '+k.slice(5)+' ✓');
                    }}>ADD IT</button>
                    <button class="ghost" onClick=${()=>setTAdd(null)}>CANCEL</button>
</div>
</div>`}
</div>`;
        })()}
</div>
    <//>`;

  const voiceTab=html`
    <${Fragment}>
      ${vt&&html`
        <div class="panel" style="text-align:center;border-color:var(--cy)">
          <div class="ptitle" style="justify-content:center"><span>${vt.label}</span></div>
          <div style="font-family:var(--mono);font-size:54px;color:var(--cy);letter-spacing:.05em;text-shadow:0 0 20px rgba(95,232,201,.4)">${fmtT(vt.left)}</div>
          <div style="height:6px;border-radius:4px;background:var(--edge);overflow:hidden;margin:12px 0">
            <div style=${{height:'100%',width:Math.round(100*(1-vt.left/vt.total))+'%',background:'linear-gradient(90deg,var(--cy),var(--amber))',transition:'width 1s linear'}}></div>
</div>
          <button class="ghost" style="color:var(--red)" onClick=${()=>setVt(null)}>stop early</button>
</div>`}
      ${stageToday&&html`
        <div class="panel" style="border-color:var(--amber);text-align:center;padding:12px">
          <b style="color:var(--amber);letter-spacing:.14em;font-size:13px"> STAGE DAY — FULL RITUAL · NEBULISER ×${nebTarget}</b>
</div>`}
      <div class="panel">
        <div class="ptitle"><span> DAILY RITUAL</span><b>${vDone} / 6${vComplete?' ✓':''} <button class="ghost" style="padding:0 6px" onClick=${()=>setVtEdit(!vtEdit)}>${vtEdit?'DONE':'⏱ EDIT'}</button></b></div>
        ${VOICE_CHECKS.map(([k,e2,l])=>html`
          <div class="supp" style="cursor:default" key=${k}>
            <button class="box" style=${{...(vc[k]?{background:'var(--cy)',borderColor:'var(--cy)',color:'#032921'}:{}),cursor:'pointer'}} onClick=${()=>setV({[k]:!vc[k]})}>${vc[k]?'✓':''}</button>
            <span style="font-size:15px;margin:0 8px">${e2}</span>
            <span style="flex:1;text-align:left">${l}</span>
            ${vtEdit?html`
              <span style="display:flex;align-items:center;gap:4px;flex:0 0 auto">
                <input inputmode="numeric" value=${vTimes[k]} onChange=${e=>setVTime(k,e.target.value)} style="width:44px;text-align:center;padding:6px 2px"/>
                <span class="dim" style="font-size:10px">min</span>
</span>
            `:!vc[k]&&!vt&&html`<button class="btn" style="flex:0 0 auto;padding:6px 11px;font-size:11px" onClick=${()=>setVt({key:k,label:e2+' '+l,endAt:Date.now()+vTimes[k]*60000,left:vTimes[k]*60,total:vTimes[k]*60,kind:'check'})}>▶ ${vTimes[k]} min</button>`}
</div>`)}
        <div class="supp" style="cursor:default">
          <span style="font-size:15px;margin-right:8px"></span>
          <span style="flex:1;text-align:left">NEBULISER <span class="dim" style="font-size:11px">— ${nebTarget}× TODAY</span></span>
          <button class="btn" style="flex:0 0 auto;padding:7px 13px" onClick=${()=>setV({neb:Math.max(0,(vc.neb||0)-1)})}>−</button>
          <b style=${{margin:'0 10px',color:(vc.neb||0)>=nebTarget?'var(--green)':(vc.neb||0)>=1?'var(--amber)':'var(--dim)'}}>${vc.neb||0}/${nebTarget}</b>
          <button class="btn" style="flex:0 0 auto;padding:7px 13px" onClick=${()=>setV({neb:(vc.neb||0)+1})}>+</button>
</div>
        <div class="supp" style="cursor:default">
          <span style="font-size:15px;margin-right:8px"></span>
          <span style="flex:1;text-align:left">STEAMING <span class="dim" style="font-size:11px">— 1-2× DAILY</span></span>
          ${vtEdit?html`
            <span style="display:flex;align-items:center;gap:4px;flex:0 0 auto;margin-right:8px">
              <input inputmode="numeric" value=${vTimes.steam} onChange=${e=>setVTime('steam',e.target.value)} style="width:44px;text-align:center;padding:6px 2px"/>
              <span class="dim" style="font-size:10px">min</span>
</span>
          `:!vt&&html`<button class="btn" style="flex:0 0 auto;padding:6px 11px;font-size:11px;margin-right:8px" onClick=${()=>setVt({key:'steam',label:' STEAM SESSION',endAt:Date.now()+vTimes.steam*60000,left:vTimes.steam*60,total:vTimes.steam*60,kind:'steam'})}>▶ ${vTimes.steam} min</button>`}
          <b style=${{margin:'0 10px',color:(vc.steam||0)>=2?'var(--green)':(vc.steam||0)>=1?'var(--amber)':'var(--dim)'}}>${vc.steam||0}/2</b>
          <button class="btn" style="flex:0 0 auto;padding:7px 13px" onClick=${()=>setV({steam:(vc.steam||0)+1})}>+</button>
</div>
        ${vComplete&&html`<div style="text-align:center;color:var(--cy);font-weight:700;font-size:13px;letter-spacing:.1em;margin-top:10px">RITUAL COMPLETE — THE SIREN IS READY</div>`}
</div>
      <div class="panel">
        <div class="ptitle"><span>HOW\u2019S THE VOICE TODAY?</span><b>${vc.feel?FEELS.find(f2=>f2[0]===vc.feel)?.[2]:''}</b></div>
        <div class="row">
          ${FEELS.map(([n2,e2,l])=>html`
            <button class=${'site'+(vc.feel===n2?' on':'')} style="padding:10px 4px" key=${n2} onClick=${()=>{setV({feel:vc.feel===n2?null:n2});if(meta!==null){const fl=(meta.feelLog||[]).filter(x=>x.date!==todayKey());saveMeta({feelLog:[...fl,{date:todayKey(),f:n2}].slice(-180)});}}}>
              <span style="font-size:19px">${e2}</span><br/><span style="font-size:9.5px">${l}</span>
            </button>`)}
</div>
        ${(meta?.feelLog||[]).length>1&&html`
          <div class="lbl mt10">LAST ${Math.min((meta.feelLog||[]).length,14)} CHECK-INS</div>
          <div style="display:flex;gap:4px;align-items:flex-end;height:34px">
            ${(meta.feelLog||[]).slice(-14).map(x=>html`
              <div key=${x.date} title=${x.date} style=${{flex:1,borderRadius:'3px',height:(x.f*20)+'%',background:x.f>=4?'var(--green)':x.f>=3?'var(--cy)':'var(--amber)',minHeight:'4px'}}></div>`)}
</div>`}
</div>
      <div class="panel">
        <div class="ptitle"><span>SIREN SCORE</span><b>${sirenRank[0]} ${sirenRank[1]}</b></div>
        <div style="display:flex;align-items:baseline;gap:10px">
          <span style="font-family:var(--mono);font-size:40px;color:var(--cy)">${sirenScore}</span>
          <span class="dim" style="font-size:12px">/ 111 today · ${vStreak}-DAY STREAK</span>
</div>
        <div style="height:7px;border-radius:4px;background:var(--edge);overflow:hidden;margin-top:8px">
          <div style=${{height:'100%',width:Math.min(100,Math.round(sirenScore/111*100))+'%',background:'linear-gradient(90deg,var(--cy),#FF8FBF)'}}></div>
</div>
        <div class="weekstrip">
          ${[...Array(7)].map((_,i)=>{
            const dt=new Date();dt.setDate(dt.getDate()-(6-i));
            const k=dkey(dt);
            const hit=!!vLog[k];
            return html`<div class=${'wd'+(hit?' hit':'')+(k===todayKey()?' today':'')} key=${k}>
              ${['S','M','T','W','T','F','S'][dt.getDay()]}<br/>${hit?'●':'·'}
</div>`;
          })}
</div>
</div>
      <div class="panel">
        <div class="ptitle">
          <span> THE RECORD</span>
          <b>
            <button class="ghost" style="padding:0 8px;font-size:14px" onClick=${()=>{setHistMonth(new Date(histMonth.getFullYear(),histMonth.getMonth()-1,1));setHistSel(null);}}>◀</button>
            ${histMonth.toLocaleDateString(undefined,{month:'long',year:'numeric'}).toUpperCase()}
            <button class="ghost" style="padding:0 8px;font-size:14px" onClick=${()=>{setHistMonth(new Date(histMonth.getFullYear(),histMonth.getMonth()+1,1));setHistSel(null);}}>▶</button>
</b>
</div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-bottom:4px">
          ${['S','M','T','W','T','F','S'].map((dl,i)=>html`<div class="dim" style="text-align:center;font-size:9px;letter-spacing:.1em" key=${i}>${dl}</div>`)}
          ${histCells.map((k,i)=>{
            if(!k)return html`<div key=${'e'+i}></div>`;
            const v=vhist[k];
            const t2=v?scTier(v.sc):null;
            return html`
              <button key=${k} onClick=${()=>setHistSel(histSel===k?null:k)}
                style=${{aspectRatio:'1',borderRadius:'9px',cursor:'pointer',fontFamily:'var(--mono)',fontSize:'11px',position:'relative',
                  border:(k===todayKey()?'1.5px solid var(--cy)':histSel===k?'1.5px solid var(--txt)':'1px solid var(--edge)'),
                  background:v?t2.bg:'transparent',opacity:v?t2.op:.45,
                  color:v&&v.sc>=30?'#032921':'var(--dim)'}}>
                ${+k.slice(8)}
                ${v&&v.ok?html`<span style="position:absolute;top:1px;right:2px;font-size:9px">★</span>`:''}
              </button>`;
          })}
</div>
        ${histStats?html`
          <div class="dim" style="font-size:11.5px;line-height:1.7;margin-top:8px">
            ${histStats.comp} complete day${histStats.comp===1?'':'s'} of ${histStats.n} tracked · avg score ${histStats.avg} · best ${histStats.bestSc} on ${histStats.bestK.slice(5)}
            ${histStats.worstLabel?html`<br/>most skipped: ${histStats.worstLabel.toLowerCase()} (${histStats.worstN}×) — the siren\u2019s weak spot `:html`<br/>nothing consistently skipped — flawless month energy`}
</div>`:html`<div class="empty" style="padding:10px 0">NO RITUAL DAYS THIS MONTH YET</div>`}
        ${histSel&&vhist[histSel]&&(()=>{
          const v=vhist[histSel];
          return html`
            <div style="border:1px dashed var(--edge2);border-radius:11px;padding:12px;margin-top:10px">
              <div class="ptitle" style="margin-bottom:8px"><span>${new Date(histSel+'T12:00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'}).toUpperCase()}</span>
                <b>${v.sc} PTS${v.ok?' · COMPLETE ★':''}</b></div>
              ${VOICE_CHECKS.map(([k2,e2,l],i)=>html`
                <div style="display:flex;gap:8px;font-size:12.5px;padding:3px 0" key=${k2}>
                  <span style=${{color:(v.b&(1<<i))?'var(--green)':'var(--red)'}}>${(v.b&(1<<i))?'✓':'✗'}</span>
                  <span>${e2} ${l}</span>
</div>`)}
              <div style="display:flex;gap:8px;font-size:12.5px;padding:3px 0">
                <span style=${{color:v.n>=2?'var(--green)':v.n>=1?'var(--amber)':'var(--red)'}}>${v.n>=2?'✓':v.n>=1?'~':'✗'}</span>
                <span> NEBULISER ×${v.n}</span>
</div>
              <div style="display:flex;gap:8px;font-size:12.5px;padding:3px 0">
                <span style=${{color:v.s>=1?'var(--green)':'var(--red)'}}>${v.s>=1?'✓':'✗'}</span>
                <span> STEAMING ×${v.s}</span>
</div>
              ${v.f>0&&html`<div style="font-size:12.5px;padding:3px 0">VOICE FELT: ${FEELS.find(f2=>f2[0]===v.f)?.[1]} ${FEELS.find(f2=>f2[0]===v.f)?.[2]}</div>`}
</div>`;
        })()}
</div>
      <div class="panel" style="background:linear-gradient(150deg,var(--panel),rgba(255,143,191,.05))">
        <div class="ptitle"><span>💡 TODAY\u2019S VOICE NOTE</span></div>
        <div style="font-size:14px;line-height:1.6;font-style:italic">${vTip}</div>
</div>
    <//>`;

  const bodyTab=html`
    <${Fragment}>
      <div class="panel">
        <div class="ptitle"><span>BODYWEIGHT</span>
          <b>${lastW?toDisp(lastW.w)+' '+uLabel:'—'}
            <button class="ghost" style="padding:0 6px" onClick=${()=>saveMeta({unit:unit==='lb'?'kg':'lb'})}>${unit==='lb'?'→ KG':'→ LB'}</button>
</b></div>
        <div class="row">
          <input inputmode="decimal" placeholder=${`Today's weight (${unit})`} value=${wIn} onInput=${e=>setWIn(e.target.value)} />
          <button class="btn solid" onClick=${logWeight}>LOG</button>
</div>
        <div class="mt12">${spark()}</div>
        ${wTrend&&html`
          <div class="statgrid mt10">
            <div class=${'stat '+(wTrend.perWeek>0?'good':'warn')}>
              <div class="k">RATE</div>
              <div class="v">${wTrend.perWeek>=0?'+':''}${toDisp(wTrend.perWeek).toFixed(2)}<small> ${unit}/wk</small></div>
</div>
            <div class="stat">
              <div class="k">${daysToGoal!==null?'T-MINUS '+P.goalLabel:'GOAL DATE'}</div>
              <div class="v">${daysToGoal!==null?daysToGoal:'—'}<small>${daysToGoal!==null?' days':''}</small></div>
</div>
</div>`}
</div>
      <div class="panel">
        <div class="ptitle"><span>🩸 BLOODWORK AI</span><b>${aiMeta?.key?(labBusy?'ANALYZING':'ONLINE'):'KEY REQUIRED'}</b></div>
        ${labBusy?html`
          <div class="dim" style="font-family:var(--mono);font-size:12px">READING THE REPORT — 15-30 SECONDS…</div>
          <div class="scanline"></div>
        `:html`
          <label class="btn wide" style="display:block;text-align:center">
            UPLOAD BLOODWORK PDF
            <input type="file" accept="application/pdf" style="display:none" onChange=${e=>{const f2=e.target.files[0];if(f2)analyzeLab(f2);e.target.value='';}} />
          </label>
        `}
        ${labReports.length>0&&html`
          <div class="lbl mt10">SAVED RECAPS</div>
          ${labReports.map(L=>html`
            <div key=${L.id}>
              <div class="meal">
                <span class="t">${L.date.slice(5)}</span>
                <span style="flex:1;padding:0 8px">${L.name||'Lab report'}</span>
                <button class="x" style="color:var(--cy);font-weight:700" onClick=${()=>setLabView(labView===L.id?null:L.id)}>${labView===L.id?'hide':'view'}</button>
                <button class="x" onClick=${()=>delLab(L.id)}>✕</button>
</div>
              ${labView===L.id&&html`
                <div class="aires" style="white-space:pre-wrap;font-size:12.5px;line-height:1.65;max-height:420px;overflow-y:auto">${L.recap}</div>
                <div class="dim" style="font-size:11px;margin:6px 0 10px">Educational recap of the report — bring it to a doctor for the real conversation.</div>
              `}
</div>`)}
        `}
</div>
      <div class="panel">
        <div class="ptitle"><span>TARGETS</span><b><button class="ghost" style="color:var(--cy)" onClick=${()=>setEditT(editT?null:{...T})}>${editT?'CLOSE':'EDIT'}</button></b></div>
        ${editT?html`
          <div class="row"><div><div class="lbl">KCAL</div><input inputmode="numeric" value=${editT.kcal} onInput=${e=>setEditT({...editT,kcal:e.target.value})}/></div>
            <div><div class="lbl">PROTEIN</div><input inputmode="numeric" value=${editT.protein} onInput=${e=>setEditT({...editT,protein:e.target.value})}/></div></div>
          <div class="row"><div><div class="lbl">WATER GOAL (GLASSES)</div><input inputmode="numeric" value=${editT.waterGoal??waterGoal} onInput=${e=>setEditT({...editT,waterGoal:e.target.value})}/></div><div></div></div>
          <div class="row mt8"><div><div class="lbl">CARBS</div><input inputmode="numeric" value=${editT.carbs} onInput=${e=>setEditT({...editT,carbs:e.target.value})}/></div>
            <div><div class="lbl">FAT</div><input inputmode="numeric" value=${editT.fat} onInput=${e=>setEditT({...editT,fat:e.target.value})}/></div></div>
          <div class="lbl mt8">LAST-MEAL CUTOFF (HH:MM)</div>
          <input value=${editT.cutoff||'21:00'} onInput=${e=>setEditT({...editT,cutoff:e.target.value})} placeholder="21:00"/>
          <div class="lbl mt8">MISSION DATE</div>
          <input value=${editT.goalDate} onInput=${e=>setEditT({...editT,goalDate:e.target.value})} placeholder="YYYY-MM-DD (blank = none)"/>
          <button class="btn solid wide mt10" onClick=${saveTargets}>SAVE TARGETS</button>
        `:html`
          <div class="dim" style="font-family:var(--mono);font-size:12.5px">
            ${T.kcal} KCAL · ${T.protein}P / ${T.carbs}C / ${T.fat}F · CUTOFF ${T.cutoff||'21:00'}${T.goalDate?' · MISSION '+T.goalDate:''}
</div>`}
</div>
      <div class="panel">
        <div class="ptitle"><span> YOUR DATA</span><b>${expBusy?'EXPORTING…':''}</b></div>
        <div class="dim" style="font-size:12px;margin-bottom:10px">Everything — profile, logs, and the last 90 days — as a JSON file you own.</div>
        <button class="btn wide" onClick=${exportData}>EXPORT MY DATA</button>
</div>
    <//>`;

  return html`
    <${Fragment}>
      <div class="hdr">
        <div class="hrow">
          <div class="logo">
            <div class="core"></div>
            <div><h1>${P.app}</h1><div class="sub">${P.sub}</div></div>
</div>
          <button class="lockb" onClick=${()=>{setAuthed(false);setPinBuf('');setPinMode('enter');}}>LOCK</button>
</div>
        <div class="datebar">
          <span>${now.toLocaleDateString(undefined,{weekday:'short',month:'short',day:'numeric'}).toUpperCase()} · ${nowHM()}</span>
          <span class="tminus">${daysToGoal!==null?`T-${daysToGoal} ${P.goalLabel}`:''}</span>
</div>
        <div class="tabs">
          ${(P.peptides?[['cmd','TODAY'],['fuel','FUEL'],['train','TRAIN'],['stack','STACK'],['body','BODY']]:[['cmd','TODAY'],['fuel','FUEL'],['train','TRAIN'],['voice','VOICE'],['stack','STACK'],['body','BODY']]).map(([id,l])=>html`
            <button class=${tab===id?'on':''} key=${id} onClick=${()=>setTab(id)}><${NavIcon} id=${id}/>${l}</button>`)}
</div>
</div>
      <div class="wrap">
        ${err&&html`<div class="banner err" onClick=${()=>setErr('')}>${err}</div>`}
        ${!dayLoaded&&!stuck&&html`<div class="panel" style="text-align:center"><b style="font-size:13px">Syncing today from the cloud…</b></div>`}
        ${!dayLoaded&&stuck&&html`<div class="panel" style="text-align:center;border-color:var(--amber)"><b style="font-size:13px;color:var(--amber)">Connection is struggling.</b><br/><button class="btn" style="margin-top:8px" onClick=${()=>location.reload()}>↻ Reload</button></div>`}
        ${tab==='cmd'?cmdTab:tab==='fuel'?fuelTab:tab==='train'?trainTab:tab==='voice'?voiceTab:tab==='stack'?stackTab:bodyTab}
</div>
      ${toast&&html`<div class="toast">${toast}</div>`}
    <//>`;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
